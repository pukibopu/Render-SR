# v2 unified evaluation config (Phase 6.3): four input variants + bicubic on the
# dataset-v2 held-out path-ID test split. Reuses the Phase 5.4 evaluator verbatim
# (L1/PSNR/SSIM, optional LPIPS, edge/non-edge L1, edge ratio, latency) — only the
# data_root, v2 checkpoints, and output_dir change.
#
# Run from the repo root:
#   python -m ai.tools.evaluate_ablation --config ai/configs/evaluate_ablation_v2.yaml
#
# Each model is the SAME shared SRUNet backbone; only in_channels differs (read
# from input_mode). bicubic is added implicitly as an anchor baseline.
# 7ch input order stays [R,G,B,depth_norm,Nx,Ny,Nz].

paths:
  # Kaggle mount of the v2 dataset (contains manifest.json + rgb_low/.. /meta).
  # Override per machine; resolve on Kaggle with:
  #   find /kaggle/input -maxdepth 5 -type d -name "output_buffers_v2"
  data_root: /kaggle/input/datasets/yvesyang1/renderaware-sr-output-buffers-v2/output_buffers_v2
  output_dir: results/v2_eval     # v2 CSVs + visuals/ written here

# Ordered list of v2 model variants. Each: name, checkpoint, input_mode.
# input_mode -> in_channels: rgb_only=3, rgb_depth=4, rgb_normal=6,
# rgb_depth_normal=7. These are the batch=32 v2 checkpoints from Phase 6.2.
methods:
  - name: sr_rgb_v2
    checkpoint: checkpoints/sr_rgb_v2_best.pt
    input_mode: rgb_only
  - name: sr_rgb_depth_v2
    checkpoint: checkpoints/sr_rgb_depth_v2_best.pt
    input_mode: rgb_depth
  - name: sr_rgb_normal_v2
    checkpoint: checkpoints/sr_rgb_normal_v2_best.pt
    input_mode: rgb_normal
  - name: sr_rendering_aware_v2
    checkpoint: checkpoints/sr_rendering_aware_v2_best.pt
    input_mode: rgb_depth_normal

eval:
  split: test                     # held-out path-ID split (same for all methods)
  depth_range: null               # must match training; null = meta near/far
  include_bicubic: true           # add a bicubic 2x anchor baseline
  num_visuals: 6                  # validation samples to render comparison grids for
  error_scale: 5.0                # amplify abs-error maps (display only)
  edge_percentile: 90.0           # target-luminance gradient pct -> edge mask
  lpips_net: alex                 # LPIPS backbone if lpips is installed
  latency_warmup: 3               # warmup forward passes before timing
